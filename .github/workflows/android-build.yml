name: AegisNet CI/CD

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Publish AegisNet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      # Using environment variables automatically provisioned by the setup-android action
      - name: Compile sing-box core libraries
        run: |
          chmod +x build-scripts/build-singbox.sh
          # Pass the standard NDK path explicitly from the Actions runner environment into the script
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk-bundle
          if [ ! -d "$ANDROID_NDK_HOME" ]; then
             # Try locating the latest specific NDK installed by default on GitHub Ubuntu runners
             export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$(ls -1 $ANDROID_SDK_ROOT/ndk | tail -n 1)
          fi
          ./build-scripts/build-singbox.sh

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build unsigned Release APK
        run: ./gradlew assembleRelease

      - name: Prepare Artifact path
        id: apk-path
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AegisNet-APK
          path: ${{ steps.apk-path.outputs.apk_path }}
          retention-days: 7

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: ${{ steps.apk-path.outputs.apk_path }}
          generate_release_notes: true
