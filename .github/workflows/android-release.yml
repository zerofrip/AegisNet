name: Android Release CI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    name: Build & Publish Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Compile sing-box core libraries
        run: |
          chmod +x build-scripts/build-singbox.sh
          # Pass the standard NDK path explicitly from the Actions runner environment into the script
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk-bundle
          if [ ! -d "$ANDROID_NDK_HOME" ]; then
             export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$(ls -1 $ANDROID_SDK_ROOT/ndk | tail -n 1)
          fi
          ./build-scripts/build-singbox.sh

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Extract Version Tag
        id: versioning
        run: |
          # The tag will look like v1.0.0
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "artifact_name=AegisNet-${TAG_NAME}-release.apk" >> $GITHUB_OUTPUT

      - name: Prepare Artifact path
        id: apk-path
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          mv "$APK_PATH" "app/build/outputs/apk/release/${{ steps.versioning.outputs.artifact_name }}"
          echo "apk_path=app/build/outputs/apk/release/${{ steps.versioning.outputs.artifact_name }}" >> $GITHUB_OUTPUT

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AegisNet-release-apk
          path: ${{ steps.apk-path.outputs.apk_path }}
          retention-days: 30

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.apk-path.outputs.apk_path }}
          generate_release_notes: true
