name: Singbox Native Build

on:
  push:
    paths:
      - 'core/sing-box/**'
      - 'core/singbox-jni/**'
      - 'build-scripts/**'
  workflow_dispatch:

jobs:
  build-native:
    name: Compile sing-box core (.so)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Compile sing-box core libraries
        run: |
          chmod +x build-scripts/build-singbox.sh
          # Pass the standard NDK path explicitly
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk-bundle
          if [ ! -d "$ANDROID_NDK_HOME" ]; then
             export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$(ls -1 $ANDROID_SDK_ROOT/ndk | tail -n 1)
          fi
          ./build-scripts/build-singbox.sh

      - name: Upload Native C-Shared Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: singbox-native-libs
          path: prebuilt/
          retention-days: 14
